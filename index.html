<!DOCTYPE html><!--DOCTYPE is use to detect the vesion of html--> 
<html>
    <head>
        <title>ShifOo</title>
        <meta name="description" content="The journy of learn Html"/>
        <meta charset="UTF-8"/>
    </head>
    <body>
        <h1>The<b> title</b> in the page</h1>
            <!--
        ul=>unordered list 
        li=>list term
        ol=>ordered list
            -->
        <ul>
            <li>Hossam</li>
            <li>Shiref</li>
            <li>Ahmed</li>
        </ul>
             <!--separaror-->

             <!--
        start=>the start point
        reverse=>reverse the order
        type=>type of order
             -->
       <ol>
        <li>Hossam</li>
        <li>Shiref</li>
        <li>Ahmed</li>
       </ol>
             <!--separaror-->

             <!--
        dl=>description list
        dt=>description title
        dd=>The description  
             -->
        <dl>
            <dt>Hossam</dt>
            <dd>Hossam love programing very much</dd>
            <dd>Hossam love cyber security very much</dd>
        </dl>
    </body>
